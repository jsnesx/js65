name: 'Build and Test and deliver js65'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install WASM workload
        run: dotnet workload restore
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
      - name: Setup repo and install deps
        run: bun install
      - name: Run Test Cases
        run: bun test
      - name: Build Bun release
        run: bun run exe
      - name: Build integration library
        run: bun run lib
      - name: Build desktop packages
        run: |
          dotnet build -c Release integrations/dotnet/js65.interop/js65.interop.csproj
          dotnet build -c Release integrations/dotnet/js65.clearscript/js65.clearscript.csproj
      - name: Run example project (desktop)
        run: |
          dotnet build -c Release integrations/dotnet/example/example.csproj -f net8.0
          dotnet build -c Release integrations/dotnet/example/example.csproj -f net8.0-browser
      - name: Upload bun artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-bun
          path: |
            build/js65*

  hermes:
    # Compile the native js65-hermes frontend on each platform via the
    # composite action, which builds (and caches) Static Hermes with LTO.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout js65
        uses: actions/checkout@v4
      - name: Build Static Hermes toolchain
        uses: ./.github/actions/hermes_compiler
        with:
          # Pin to a commit on Hermes' static_h branch for reproducible builds.
          hermes-ref: ccc48ff6c0d7c0d9a54e5f42b56dc0df15439608
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
      - name: Install deps
        run: bun install
      - name: Build js65-hermes
        shell: bash
        env:
          HERMES_SRC: ${{ github.workspace }}/hermes
          HERMES_BUILD: ${{ github.workspace }}/hermes/build
          # Ninja is single-config, so there is no per-config output subdir.
          HERMES_CONFIG: ''
        run: bun run hermes-exe
      - name: Upload hermes artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-hermes
          path: build/js65-hermes*

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install WASM workload
        run: dotnet workload restore
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
      - name: Setup repo and install deps
        run: bun install
      - name: Build integration library
        run: bun run lib
      - name: Pack NuGet packages
        run: |
          dotnet pack -c Release integrations/dotnet/js65.interop/js65.interop.csproj --output build/nuget/
          dotnet pack -c Release integrations/dotnet/js65.clearscript/js65.clearscript.csproj --output build/nuget/
          dotnet pack -c Release integrations/dotnet/js65.browser/js65.browser.csproj --output build/nuget/
      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: build/nuget/*.nupkg

  publish:
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: nuget/
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: NuGet push
        run: dotnet nuget push nuget/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
